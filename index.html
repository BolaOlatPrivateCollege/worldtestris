<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro FINAL FIX</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
    }

    #panel { margin-left:20px; }

    #controls {
      position:fixed;
      bottom:20px;
      display:flex;
      gap:10px;
    }

    #controls button {
      padding:15px;
      font-size:20px;
      background:#0ff;
      border:none;
      border-radius:8px;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:30px;
    }
  </style>
</head>

<body>

<canvas id="game" width="200" height="400"></canvas>

<div id="panel">
  <h2>Score: <span id="score">0</span></h2>
  <h3>Level: <span id="level">1</span></h3>
</div>

<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="moveDown()">⬇️</button>
</div>

<div id="overlay">
  <div>GAME OVER</div>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const SIZE = 20;

let board, piece, score, level, speed, gameOver;

// 🎯 SHAPES
const pieces = [
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function init(){
 board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
 score = 0;
 level = 1;
 speed = 500;
 gameOver = false;
 piece = randomPiece();
 updateUI();
 gameLoop();
}

function randomPiece(){
 let p = pieces[Math.floor(Math.random()*pieces.length)];
 return {
   shape: p.shape,
   color: p.color,
   x: Math.floor(COLS/2) - 1,
   y: 0
 };
}

function drawCell(x,y,color){
 ctx.fillStyle = color;
 ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val) drawCell(x,y,val);
   });
 });

 piece.shape.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val) drawCell(piece.x+x,piece.y+y,piece.color);
   });
 });
}

// ✅ COLLISION (UNCHANGED)
function collision(){
 for(let y=0;y<piece.shape.length;y++){
   for(let x=0;x<piece.shape[y].length;x++){

     if(!piece.shape[y][x]) continue;

     let newX = piece.x + x;
     let newY = piece.y + y;

     if(newX < 0 || newX >= COLS) return true;
     if(newY >= ROWS) return true;
     if(newY >= 0 && board[newY][newX]) return true;
   }
 }
 return false;
}

// ✅ NEW: CHECK WIDTH BEFORE MOVING
function canMove(dir){
 for(let y=0;y<piece.shape.length;y++){
   for(let x=0;x<piece.shape[y].length;x++){

     if(!piece.shape[y][x]) continue;

     let newX = piece.x + x + dir;

     if(newX < 0 || newX >= COLS) return false;
   }
 }
 return true;
}

function merge(){
 piece.shape.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val){
       if(piece.y+y < 0){
         endGame();
         return;
       }
       board[piece.y+y][piece.x+x] = piece.color;
     }
   });
 });
}

function clearLines(){
 let lines = 0;

 board = board.filter(row=>{
   if(row.every(cell=>cell!==0)){
     lines++;
     return false;
   }
   return true;
 });

 while(board.length < ROWS){
   board.unshift(Array(COLS).fill(0));
 }

 if(lines > 0){
   score += lines * 10;
   level = Math.floor(score/50)+1;
   speed = Math.max(100,500-(level*40));
   updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText = score;
 document.getElementById("level").innerText = level;
}

function moveDown(){
 if(gameOver) return;

 piece.y++;

 if(collision()){
   piece.y--;
   merge();
   clearLines();
   piece = randomPiece();

   if(collision()) endGame();
 }
}

// ✅ FIXED MOVE (RIGHT WALL PERFECT)
function move(dir){
 if(!canMove(dir)) return;

 piece.x += dir;

 if(collision()){
   piece.x -= dir;
 }
}

// ✅ ROTATION
function rotate(){
 let rotated = piece.shape[0].map((_,i)=>
   piece.shape.map(row=>row[i]).reverse()
 );

 let oldX = piece.x;
 let oldShape = piece.shape;

 piece.shape = rotated;

 if(collision()){
   piece.x++;
   if(collision()){
     piece.x -= 2;
     if(collision()){
       piece.x = oldX;
       piece.shape = oldShape;
     }
   }
 }
}

function endGame(){
 gameOver = true;
 document.getElementById("overlay").style.display = "flex";
}

window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
   e.preventDefault();
 }

 if(gameOver) return;

 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
});

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();

 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
