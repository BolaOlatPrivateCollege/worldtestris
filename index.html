<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro Ultimate (Clean Multiplayer)</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
      margin:5px;
    }

    #panel { margin-left:20px; }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<canvas id="game" width="200" height="400"></canvas>
<canvas id="opponent" width="120" height="200"></canvas>

<div id="panel">
  <h3>Next</h3>
  <canvas id="next" width="100" height="100"></canvas>

  <h3>Hold</h3>
  <canvas id="hold" width="100" height="100"></canvas>
</div>

<div id="overlay">
  <h1>GAME OVER</h1>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
// ================= GAME ENGINE =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const nextCtx = document.getElementById("next").getContext("2d");
const holdCtx = document.getElementById("hold").getContext("2d");
const oppCtx = document.getElementById("opponent").getContext("2d");

const ROWS=20, COLS=10, SIZE=20;

let board, piece, nextPiece, holdPiece=null;
let canHold=true, gameOver=false;

// SHAPES
const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 piece=randomPiece();
 nextPiece=randomPiece();
}

function drawCell(ctx,x,y,color,size){
 ctx.fillStyle=color;
 ctx.fillRect(x*size,y*size,size,size);
}

// GHOST
function drawGhost(){
 let y=piece.y;
 while(!checkCollision(piece.x,y,piece.shape)) y++;
 y--;

 piece.shape.forEach((r,dy)=>r.forEach((v,dx)=>{
  if(v){
    ctx.globalAlpha=0.3;
    drawCell(ctx,piece.x+dx,y+dy,piece.color,SIZE);
    ctx.globalAlpha=1;
  }
 }));
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawGhost();

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,v,SIZE)));

 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,piece.x+x,piece.y+y,piece.color,SIZE)));

 drawMini(nextCtx,nextPiece);
 drawMini(holdCtx,holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;
 p.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,p.color,20)));
}

// COLLISION
function checkCollision(px,py,shape){
 for(let y=0;y<shape.length;y++){
  for(let x=0;x<shape[y].length;x++){
   if(!shape[y][x]) continue;

   let nx=px+x, ny=py+y;

   if(nx<0||nx>=COLS||ny>=ROWS) return true;
   if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function collision(){ return checkCollision(piece.x,piece.y,piece.shape); }

// GAME ACTIONS
function moveDown(){
 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  spawnNext();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
}

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
    if(piece.y+y<0) endGame();
    board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function spawnNext(){
 piece=nextPiece;
 piece.x=3; piece.y=0;
 nextPiece=randomPiece();
 canHold=true;

 if(collision()) endGame();
}

function clearLines(){
 let lines=0;

 board=board.filter(r=>{
  if(r.every(c=>c)){lines++;return false;}
  return true;
 });

 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0) sendAttack(lines);
}

// HOLD
function hold(){
 if(!canHold) return;

 if(!holdPiece){
  holdPiece=createPiece(piece);
  spawnNext();
 } else {
  let t=createPiece(piece);
  piece=createPiece(holdPiece);
  holdPiece=t;
 }

 canHold=false;
}

// HARD DROP
function hardDrop(){
 while(!collision()) piece.y++;
 piece.y--;
 merge();
 clearLines();
 spawnNext();
}

function endGame(){
 gameOver=true;
 document.getElementById("overlay").style.display="flex";
}

// ================= MULTIPLAYER =================
let socket = new WebSocket("wss://tetris-server-fowt.onrender.com");

socket.onmessage = (e)=>{
 let data = JSON.parse(e.data);

 if(data.type==="state") drawOpponent(data.board);
 if(data.type==="attack") addGarbage(data.lines);
};

function sendState(){
 if(socket.readyState===1){
  socket.send(JSON.stringify({type:"state",board}));
 }
}

function sendAttack(lines){
 if(socket.readyState===1){
  socket.send(JSON.stringify({type:"attack",lines}));
 }
}

function drawOpponent(b){
 oppCtx.clearRect(0,0,120,200);
 b.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
    oppCtx.fillStyle="red";
    oppCtx.fillRect(x*10,y*10,10,10);
  }
 }));
}

function addGarbage(lines){
 for(let i=0;i<lines;i++){
  board.shift();
  let row=Array(COLS).fill("gray");
  row[Math.floor(Math.random()*COLS)]=0;
  board.push(row);
 }
}

// ================= LOOP =================
function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();
 sendState();

 setTimeout(gameLoop,400);
}

// CONTROLS
window.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
 if(e.key==="c"||e.key==="C") hold();
 if(e.code==="Space") hardDrop();
});

init();
gameLoop();
</script>

</body>
</html>
