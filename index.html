<!DOCTYPE html>
<html>
<head>
  <title>Tetris Mobile Pro FINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    canvas {
      background:black;
      box-shadow:0 0 15px cyan;
    }

    #game {
      width:90vw;
      max-width:300px;
      height:auto;
    }

    #panel {
      text-align:center;
      margin-top:10px;
    }

    #panel canvas {
      width:80px;
      height:80px;
    }

    #controls {
      margin-top:15px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      width:90vw;
      max-width:320px;
    }

    #controls button {
      padding:15px;
      font-size:20px;
      border:none;
      border-radius:10px;
      background:#0ff;
      color:black;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<canvas id="game" width="200" height="400"></canvas>

<div id="panel">
  <h3>Score: <span id="score">0</span></h3>
  <h4>Level: <span id="level">1</span></h4>

  <canvas id="next" width="100" height="100"></canvas>
  <canvas id="hold" width="100" height="100"></canvas>

  <button onclick="toggleMute()">🔊</button>
  <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">
</div>

<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="moveDown()">⬇️</button>
  <button onclick="hardDrop()">⚡</button>
  <button onclick="hold()">🧊</button>
</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<!-- AUDIO -->
<audio id="bgm" src="bg.mp3" loop></audio>
<audio id="moveSound" src="move.wav"></audio>
<audio id="rotateSound" src="rotate.wav"></audio>
<audio id="clearSound" src="clear.wav"></audio>
<audio id="dropSound" src="drop.wav"></audio>
<audio id="gameOverSound" src="gameover.wav"></audio>

<script>
// 🔊 SOUND SYSTEM
let muted = false;
let volume = 0.5;

function playSound(id){
  if(muted) return;
  let s = document.getElementById(id);
  s.currentTime = 0;
  s.volume = volume;
  s.play().catch(()=>{});
}

function setVolume(v){
  volume = v;
  document.getElementById("bgm").volume = v;
}

function toggleMute(){
  muted = !muted;
  document.getElementById("bgm").muted = muted;
}

// 🔓 AUDIO UNLOCK (IMPORTANT)
document.body.addEventListener("click", () => {
  document.getElementById("bgm").play().catch(()=>{});
}, { once:true });

// GAME SETUP
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const nextCtx = document.getElementById("next").getContext("2d");
const holdCtx = document.getElementById("hold").getContext("2d");

const ROWS=20, COLS=10, SIZE=20;

let board, piece, nextPiece, holdPiece=null;
let canHold=true;
let score, level, speed, gameOver;

const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score=0; level=1; speed=500; gameOver=false;
 piece=randomPiece(); nextPiece=randomPiece();

 document.getElementById("bgm").volume = volume;

 updateUI();
 gameLoop();
}

function drawCell(ctx,x,y,color,size){
 ctx.fillStyle=color;
 ctx.fillRect(x*size,y*size,size,size);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*size,y*size,size,size);
}

// 👁️ GHOST
function drawGhost(){
 let y=piece.y;
 while(!checkCollision(piece.x,y,piece.shape)) y++;
 y--;

 piece.shape.forEach((r,dy)=>r.forEach((v,dx)=>{
  if(v){
    ctx.globalAlpha=0.3;
    drawCell(ctx,piece.x+dx,y+dy,piece.color,SIZE);
    ctx.globalAlpha=1;
  }
 }));
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawGhost();

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,v,SIZE)));
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,piece.x+x,piece.y+y,piece.color,SIZE)));

 drawMini(nextCtx,nextPiece);
 drawMini(holdCtx,holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;
 p.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,p.color,20)));
}

function checkCollision(px,py,shape){
 for(let y=0;y<shape.length;y++){
  for(let x=0;x<shape[y].length;x++){
   if(!shape[y][x]) continue;

   let nx=px+x, ny=py+y;

   if(nx<0||nx>=COLS) return true;
   if(ny>=ROWS) return true;
   if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function collision(){ return checkCollision(piece.x,piece.y,piece.shape); }

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   if(piece.y+y<0) endGame();
   board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function clearLines(){
 let lines=0;

 board=board.filter(r=>{
  if(r.every(c=>c!==0)){lines++;return false;}
  return true;
 });

 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0){
  playSound("clearSound");
  score+=lines*10;
  level=Math.floor(score/50)+1;
  speed=Math.max(100,500-(level*40));
  updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("level").innerText=level;
}

function spawnNext(){
 piece=nextPiece;
 piece.x=3; piece.y=0;
 nextPiece=randomPiece();
 canHold=true;

 if(collision()) endGame();
}

function moveDown(){
 if(gameOver) return;

 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  spawnNext();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
 else playSound("moveSound");
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
 else playSound("rotateSound");
}

function hold(){
 if(!canHold) return;

 if(!holdPiece){
  holdPiece=createPiece(piece);
  spawnNext();
 } else {
  let t=createPiece(piece);
  piece=createPiece(holdPiece);
  holdPiece=t;
 }

 canHold=false;
}

function hardDrop(){
 while(!collision()) piece.y++;
 piece.y--;

 playSound("dropSound");

 merge();
 clearLines();
 spawnNext();
}

function endGame(){
 gameOver=true;
 playSound("gameOverSound");
 document.getElementById("overlay").style.display="flex";
}

// 🎮 KEYBOARD
window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();

 if(gameOver) return;

 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
 if(e.key==="c"||e.key==="C") hold();
 if(e.code==="Space") hardDrop();
});

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();
 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
