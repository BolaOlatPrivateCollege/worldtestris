<!DOCTYPE html>
<html>
<head>
  <title>Tetris Mobile Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      overflow:hidden; /* 🚫 NO SCROLL */
    }

    #game {
      display:block;
      margin:auto;
      background:black;
      box-shadow:0 0 15px cyan;
    }

    #panel {
      text-align:center;
      font-size:14px;
    }

    #panel canvas {
      width:60px;
      height:60px;
    }

    #controls {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:8px;
      padding:10px;
    }

    #controls button {
      padding:12px;
      font-size:18px;
      border:none;
      border-radius:8px;
      background:#0ff;
      color:black;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<canvas id="game"></canvas>

<div id="panel">
  Score: <span id="score">0</span> |
  Level: <span id="level">1</span><br>

  Next:
  <canvas id="next" width="100" height="100"></canvas>

  Hold:
  <canvas id="hold" width="100" height="100"></canvas>
</div>

<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="moveDown()">⬇️</button>
  <button onclick="hardDrop()">⚡</button>
  <button onclick="hold()">🧊</button>
</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
// 📱 AUTO FIT CANVAS TO SCREEN HEIGHT
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;

let SIZE;

// 🔥 AUTO SCALE BASED ON SCREEN HEIGHT
function resizeGame(){
  const availableHeight = window.innerHeight * 0.6;
  SIZE = Math.floor(availableHeight / ROWS);

  canvas.width = COLS * SIZE;
  canvas.height = ROWS * SIZE;
}

resizeGame();
window.addEventListener("resize", resizeGame);

// OTHER CANVASES
const nextCtx = document.getElementById("next").getContext("2d");
const holdCtx = document.getElementById("hold").getContext("2d");

let board, piece, nextPiece, holdPiece=null;
let canHold=true;
let score, level, speed, gameOver;

// SHAPES
const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score=0; level=1; speed=500; gameOver=false;
 piece=randomPiece(); nextPiece=randomPiece();
 updateUI();
 gameLoop();
}

function drawCell(x,y,color){
 ctx.fillStyle=color;
 ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

// 👁️ GHOST
function drawGhost(){
 let y=piece.y;
 while(!checkCollision(piece.x,y,piece.shape)) y++;
 y--;

 piece.shape.forEach((r,dy)=>r.forEach((v,dx)=>{
  if(v){
    ctx.globalAlpha=0.3;
    drawCell(piece.x+dx,y+dy,piece.color);
    ctx.globalAlpha=1;
  }
 }));
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawGhost();

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(x,y,v)));
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(piece.x+x,piece.y+y,piece.color)));

 drawMini(nextCtx,nextPiece);
 drawMini(holdCtx,holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;
 p.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
    ctx.fillStyle=p.color;
    ctx.fillRect(x*20,y*20,20,20);
  }
 }));
}

function checkCollision(px,py,shape){
 for(let y=0;y<shape.length;y++){
  for(let x=0;x<shape[y].length;x++){
   if(!shape[y][x]) continue;

   let nx=px+x, ny=py+y;

   if(nx<0||nx>=COLS) return true;
   if(ny>=ROWS) return true;
   if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function collision(){ return checkCollision(piece.x,piece.y,piece.shape); }

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   if(piece.y+y<0) endGame();
   board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function clearLines(){
 let lines=0;
 board=board.filter(r=>{
  if(r.every(c=>c!==0)){lines++;return false;}
  return true;
 });

 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0){
  score+=lines*10;
  level=Math.floor(score/50)+1;
  speed=Math.max(100,500-(level*40));
  updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("level").innerText=level;
}

function spawnNext(){
 piece=nextPiece;
 piece.x=3; piece.y=0;
 nextPiece=randomPiece();
 canHold=true;

 if(collision()) endGame();
}

function moveDown(){
 if(gameOver) return;

 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  spawnNext();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
}

function hold(){
 if(!canHold) return;

 if(!holdPiece){
  holdPiece=createPiece(piece);
  spawnNext();
 } else {
  let t=createPiece(piece);
  piece=createPiece(holdPiece);
  holdPiece=t;
 }

 canHold=false;
}

function hardDrop(){
 while(!collision()) piece.y++;
 piece.y--;
 merge();
 clearLines();
 spawnNext();
}

function endGame(){
 gameOver=true;
 document.getElementById("overlay").style.display="flex";
}

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();
 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
