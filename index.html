<!DOCTYPE html>
<html>
<head>
  <title>Tetris Perfect Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    #container {
      display:flex;
      gap:12px; /* 🔥 more spacing */
      align-items:center;
    }

    canvas {
      background:black;
      box-shadow:0 0 10px cyan;
    }

    #side {
      display:flex;
      flex-direction:column;
      gap:12px;
      font-size:12px;
    }

    #side canvas {
      width:70px;
      height:70px;
    }

    #controls {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px; /* 🔥 more spacing */
      margin-top:10px;
    }

    #controls button {
      padding:12px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background:#0ff;
      color:black;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<div id="container">

  <canvas id="game"></canvas>

  <div id="side">
    <div>Score: <span id="score">0</span></div>
    <div>Level: <span id="level">1</span></div>

    <div>Next</div>
    <canvas id="next" width="100" height="100"></canvas>

    <div>Hold</div>
    <canvas id="hold" width="100" height="100"></canvas>

    <div id="controls">
      <button onclick="move(-1)">⬅️</button>
      <button onclick="move(1)">➡️</button>
      <button onclick="rotate()">🔄</button>
      <button onclick="moveDown()">⬇️</button>
      <button onclick="hardDrop()">⚡</button>
      <button onclick="hold()">🧊</button>
    </div>
  </div>

</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<!-- AUDIO -->
<audio id="bgm" src="bg.mp3" loop></audio>
<audio id="moveSound" src="move.wav"></audio>
<audio id="rotateSound" src="rotate.wav"></audio>
<audio id="clearSound" src="clear.wav"></audio>
<audio id="dropSound" src="drop.wav"></audio>
<audio id="gameOverSound" src="gameover.wav"></audio>

<script>
// 🔊 SOUND
let volume=0.5;
function playSound(id){
 let s=document.getElementById(id);
 s.currentTime=0;
 s.volume=volume;
 s.play().catch(()=>{});
}

document.body.addEventListener("click",()=>{
 document.getElementById("bgm").play().catch(()=>{});
},{once:true});

// 📱 PERFECT FIT (NO CUTTING)
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const ROWS=20, COLS=10;
let SIZE;

function resize(){
 const maxHeight = window.innerHeight * 0.9;
 const maxWidth = window.innerWidth * 0.5;

 SIZE = Math.floor(Math.min(maxHeight / ROWS, maxWidth / COLS));

 canvas.width = COLS * SIZE;
 canvas.height = ROWS * SIZE;
}

resize();
window.addEventListener("resize",resize);

const nextCtx=document.getElementById("next").getContext("2d");
const holdCtx=document.getElementById("hold").getContext("2d");

// GAME
let board,piece,nextPiece,holdPiece=null,canHold=true;
let score,level,speed,gameOver;

const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score=0;level=1;speed=500;gameOver=false;

 piece=randomPiece();
 nextPiece=randomPiece();

 document.getElementById("bgm").volume=volume;

 updateUI();
 gameLoop();
}

function drawCell(x,y,color){
 ctx.fillStyle=color;
 ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(x,y,v)));
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(piece.x+x,piece.y+y,piece.color)));

 drawMini(nextCtx,nextPiece);
 drawMini(holdCtx,holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;

 p.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   ctx.fillStyle=p.color;
   ctx.fillRect(x*20,y*20,20,20);
  }
 }));
}

function checkCollision(px,py,shape){
 for(let y=0;y<shape.length;y++){
  for(let x=0;x<shape[y].length;x++){
   if(!shape[y][x]) continue;

   let nx=px+x, ny=py+y;

   if(nx<0||nx>=COLS) return true;
   if(ny>=ROWS) return true;
   if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function collision(){return checkCollision(piece.x,piece.y,piece.shape);}

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   if(piece.y+y<0) endGame();
   board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function clearLines(){
 let lines=0;
 board=board.filter(r=>{
  if(r.every(c=>c!==0)){lines++;return false;}
  return true;
 });

 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0){
  playSound("clearSound");
  score+=lines*10;
  level=Math.floor(score/50)+1;
  speed=Math.max(100,500-(level*40));
  updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("level").innerText=level;
}

function spawnNext(){
 piece=nextPiece;
 piece.x=3;piece.y=0;
 nextPiece=randomPiece();
 canHold=true;
 if(collision()) endGame();
}

function moveDown(){
 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  spawnNext();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
 else playSound("moveSound");
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
 else playSound("rotateSound");
}

function hold(){
 if(!canHold) return;

 if(!holdPiece){
  holdPiece=createPiece(piece);
  spawnNext();
 } else {
  let t=createPiece(piece);
  piece=createPiece(holdPiece);
  holdPiece=t;
 }

 canHold=false;
}

function hardDrop(){
 while(!collision()) piece.y++;
 piece.y--;
 playSound("dropSound");
 merge();
 clearLines();
 spawnNext();
}

function endGame(){
 gameOver=true;
 playSound("gameOverSound");
 document.getElementById("overlay").style.display="flex";
}

function gameLoop(){
 if(gameOver) return;
 moveDown();
 draw();
 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
