<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro Stable</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
    }

    #panel { margin-left:20px; }

    #controls {
      position:fixed;
      bottom:20px;
      display:flex;
      gap:10px;
    }

    #controls button {
      padding:15px;
      font-size:20px;
      background:#0ff;
      border:none;
      border-radius:8px;
    }

    #startScreen {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:30px;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:30px;
    }
  </style>
</head>

<body>

<canvas id="game" width="240" height="400"></canvas>

<div id="panel">
  <h2>Score: <span id="score">0</span></h2>
  <h3>Level: <span id="level">1</span></h3>
</div>

<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="moveDown()">⬇️</button>
</div>

<div id="startScreen">
  <button onclick="startGame()" style="padding:20px;font-size:20px;">START GAME</button>
</div>

<div id="overlay">
  <div>GAME OVER</div>
  <button onclick="location.reload()">Restart</button>
</div>

<!-- AUDIO -->
<audio id="bgm" src="bg.mp3" loop></audio>
<audio id="moveSound" src="move.wav"></audio>
<audio id="rotateSound" src="rotate.wav"></audio>
<audio id="clearSound" src="clear.wav"></audio>
<audio id="gameOverSound" src="gameover.wav"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const SIZE = 20;

let board, piece, score, level, speed;
let gameOver = false;
let gameStarted = false;

// 🎯 7 SHAPES
const pieces = [
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function init(){
 board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score = 0;
 level = 1;
 speed = 500;
 gameOver = false;
 piece = randomPiece();
 updateUI();
}

function randomPiece(){
 let p = pieces[Math.floor(Math.random()*pieces.length)];
 return {shape:p.shape,color:p.color,x:3,y:0};
}

function drawCell(x,y,color){
 ctx.fillStyle = color;
 ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((row,y)=>{
  row.forEach((val,x)=>{
    if(val) drawCell(x,y,val);
  });
 });

 piece.shape.forEach((row,y)=>{
  row.forEach((val,x)=>{
    if(val) drawCell(piece.x+x,piece.y+y,piece.color);
  });
 });
}

// ✅ COLLISION FIX
function collision(){
 return piece.shape.some((row,y)=>
  row.some((val,x)=>{
    if(!val) return false;

    let newX = piece.x + x;
    let newY = piece.y + y;

    if(newX < 0 || newX >= COLS) return true;
    if(newY >= ROWS) return true;
    if(newY >= 0 && board[newY][newX]) return true;

    return false;
  })
 );
}

function merge(){
 piece.shape.forEach((row,y)=>{
  row.forEach((val,x)=>{
    if(val){
      if(piece.y+y < 0) endGame();
      board[piece.y+y][piece.x+x] = piece.color;
    }
  });
 });
}

function clearLines(){
 let lines = 0;

 board = board.filter(row=>{
  if(row.every(cell=>cell!==0)){
    lines++;
    return false;
  }
  return true;
 });

 while(board.length < ROWS){
  board.unshift(Array(COLS).fill(0));
 }

 if(lines>0){
  playSound("clearSound");
  score += lines * 10;
  level = Math.floor(score/50)+1;
  speed = Math.max(100,500-(level*40));
  updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText = score;
 document.getElementById("level").innerText = level;
}

function moveDown(){
 if(gameOver || !gameStarted) return;

 piece.y++;

 if(collision()){
  piece.y--;
  merge();
  clearLines();
  piece = randomPiece();

  if(collision()) endGame();
 }
}

function move(dir){
 piece.x += dir;
 if(collision()) piece.x -= dir;
 else playSound("moveSound");
}

function rotate(){
 let rotated = piece.shape[0].map((_,i)=>
  piece.shape.map(row=>row[i]).reverse()
 );

 let oldX = piece.x;
 let oldShape = piece.shape;

 piece.shape = rotated;

 if(collision()){
  piece.x++;
  if(collision()){
    piece.x -= 2;
    if(collision()){
      piece.x = oldX;
      piece.shape = oldShape;
    }
  }
 } else {
  playSound("rotateSound");
 }
}

function endGame(){
 gameOver = true;
 document.getElementById("overlay").style.display = "flex";
 playSound("gameOverSound");
}

// 🔊 SOUND FIX
function playSound(id){
 let s = document.getElementById(id);
 s.currentTime = 0;
 s.play().catch(()=>{});
}

// 🎮 CONTROLS
window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
  e.preventDefault();
 }

 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
});

// ▶ START GAME
function startGame(){
 gameStarted = true;
 document.getElementById("startScreen").style.display="none";

 let bgm = document.getElementById("bgm");
 bgm.play().catch(()=>{});

 gameLoop();
}

function gameLoop(){
 if(gameOver || !gameStarted) return;

 moveDown();
 draw();

 setTimeout(gameLoop, speed);
}

init();
</script>

</body>
</html>
