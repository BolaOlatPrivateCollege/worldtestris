<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro Ultimate</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
    }

    #panel { margin-left:20px; width:200px; }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:24px;
    }

    input {
      padding:10px;
      margin-top:10px;
      font-size:16px;
    }

    button {
      margin-top:10px;
      padding:10px;
      font-size:16px;
    }

    #leaderboard {
      margin-top:20px;
      background:#111;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<canvas id="game" width="200" height="400"></canvas>

<div id="panel">
  <h2>Score: <span id="score">0</span></h2>
  <h3>Level: <span id="level">1</span></h3>

  <h3>Next</h3>
  <canvas id="next" width="100" height="100"></canvas>

  <h3>Hold</h3>
  <canvas id="hold" width="100" height="100"></canvas>

  <div id="leaderboard">
    <h3>🏆 Top Scores</h3>
    <ol id="scores"></ol>
  </div>
</div>

<div id="overlay">
  <div>GAME OVER</div>
  <input id="playerName" placeholder="Enter your name"/>
  <button onclick="saveScore()">Save Score</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const nextCtx = document.getElementById("next").getContext("2d");
const holdCtx = document.getElementById("hold").getContext("2d");

const ROWS=20, COLS=10, SIZE=20;

let board, piece, nextPiece, holdPiece=null;
let canHold=true;
let score, level, speed, gameOver;

// 🎯 SHAPES
const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score=0; level=1; speed=500; gameOver=false;
 piece=randomPiece(); nextPiece=randomPiece();

 updateUI();
 loadScores();
 gameLoop();
}

function drawCell(ctx,x,y,color,size){
 ctx.fillStyle=color;
 ctx.fillRect(x*size,y*size,size,size);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*size,y*size,size,size);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,v,SIZE)));
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,piece.x+x,piece.y+y,piece.color,SIZE)));

 drawMini(nextCtx,nextPiece);
 drawMini(holdCtx,holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;
 p.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,p.color,20)));
}

function checkCollision(px,py,shape){
 for(let y=0;y<shape.length;y++){
  for(let x=0;x<shape[y].length;x++){
   if(!shape[y][x]) continue;
   let nx=px+x, ny=py+y;

   if(nx<0||nx>=COLS) return true;
   if(ny>=ROWS) return true;
   if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function collision(){ return checkCollision(piece.x,piece.y,piece.shape); }

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   if(piece.y+y<0) endGame();
   board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function clearLines(){
 let lines=0;
 board=board.filter(r=>{
  if(r.every(c=>c!==0)){lines++;return false;}
  return true;
 });
 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0){
  score+=lines*10;
  level=Math.floor(score/50)+1;
  speed=Math.max(100,500-(level*40));
  updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("level").innerText=level;
}

function spawnNext(){
 piece=nextPiece;
 piece.x=3; piece.y=0;
 nextPiece=randomPiece();
 canHold=true;

 if(collision()) endGame();
}

function moveDown(){
 if(gameOver) return;

 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  spawnNext();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
}

function hold(){
 if(!canHold) return;

 if(!holdPiece){
  holdPiece=createPiece(piece);
  spawnNext();
 } else {
  let t=createPiece(piece);
  piece=createPiece(holdPiece);
  holdPiece=t;
 }

 canHold=false;
}

function endGame(){
 gameOver=true;
 document.getElementById("overlay").style.display="flex";
}

// 🏆 LEADERBOARD
function saveScore(){
 let name=document.getElementById("playerName").value || "Player";
 let scores=JSON.parse(localStorage.getItem("tetrisScores"))||[];

 scores.push({name,score});
 scores.sort((a,b)=>b.score-a.score);
 scores=scores.slice(0,5);

 localStorage.setItem("tetrisScores",JSON.stringify(scores));

 location.reload();
}

function loadScores(){
 let scores=JSON.parse(localStorage.getItem("tetrisScores"))||[];
 let list=document.getElementById("scores");
 list.innerHTML="";

 scores.forEach(s=>{
  let li=document.createElement("li");
  li.innerText=`${s.name} - ${s.score}`;
  list.appendChild(li);
 });
}

window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) e.preventDefault();

 if(gameOver) return;

 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
 if(e.key==="c"||e.key==="C") hold();
});

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();

 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
