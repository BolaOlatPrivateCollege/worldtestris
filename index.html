<!DOCTYPE html>
<html>
<head>
  <title>Tetris Fixed</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
    }

    #startBtn {
      position:fixed;
      top:20px;
      left:20px;
      padding:12px;
      background:lime;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<button id="startBtn" onclick="startGame()">START</button>

<canvas id="game" width="240" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const SIZE = 20;

let board, piece;
let gameStarted=false, gameOver=false;

// ✅ ORIGINAL SHAPES (NEVER MUTATE THESE)
const SHAPES = [
 [[1,1,1,1]],                 // I
 [[1,1],[1,1]],               // O
 [[0,1,0],[1,1,1]],           // T
 [[0,1,1],[1,1,0]],           // S
 [[1,1,0],[0,1,1]],           // Z
 [[1,0,0],[1,1,1]],           // J
 [[0,0,1],[1,1,1]]            // L
];

const COLORS = ["cyan","yellow","purple","green","red","blue","orange"];

function cloneShape(shape){
  return shape.map(row => [...row]); // ✅ FIX
}

function randomPiece(){
  let i = Math.floor(Math.random()*SHAPES.length);

  return {
    shape: cloneShape(SHAPES[i]), // ✅ CLONE
    color: COLORS[i],
    x: Math.floor((COLS - SHAPES[i][0].length)/2),
    y: 0
  };
}

function init(){
  board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
  piece = randomPiece();
}

function drawCell(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  ctx.strokeStyle="#111";
  ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  board.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val) drawCell(x,y,val);
    });
  });

  piece.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val) drawCell(piece.x+x,piece.y+y,piece.color);
    });
  });
}

// ✅ PERFECT COLLISION
function collision(){
  for(let y=0;y<piece.shape.length;y++){
    for(let x=0;x<piece.shape[y].length;x++){
      if(piece.shape[y][x]){
        let newX = piece.x + x;
        let newY = piece.y + y;

        if(newX < 0 || newX >= COLS) return true;
        if(newY >= ROWS) return true;
        if(newY >= 0 && board[newY][newX]) return true;
      }
    }
  }
  return false;
}

function merge(){
  piece.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val){
        if(piece.y+y < 0) gameOver=true;
        board[piece.y+y][piece.x+x] = piece.color;
      }
    });
  });
}

function moveDown(){
  if(!gameStarted || gameOver) return;

  piece.y++;

  if(collision()){
    piece.y--;
    merge();
    piece = randomPiece();

    if(collision()) gameOver=true;
  }
}

function move(dir){
  piece.x += dir;

  if(collision()){
    piece.x -= dir;
  }
}

// ✅ SAFE ROTATION (NO SHAPE DAMAGE)
function rotate(){
  let newShape = piece.shape[0].map((_,i)=>
    piece.shape.map(row=>row[i]).reverse()
  );

  let old = piece.shape;
  piece.shape = newShape;

  if(collision()){
    piece.shape = old;
  }
}

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move(-1);
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowDown") moveDown();
  if(e.key==="ArrowUp") rotate();
});

function startGame(){
  gameStarted = true;
  document.getElementById("startBtn").style.display="none";
  gameLoop();
}

function gameLoop(){
  if(!gameStarted || gameOver) return;

  moveDown();
  draw();

  setTimeout(gameLoop, 500);
}

init();
</script>

</body>
</html>
