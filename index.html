<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro UI Upgrade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    #container {
      display:flex;
      gap:12px;
      align-items:center;
    }

    canvas {
      background:black;
      box-shadow:0 0 10px cyan;
    }

    #side {
      display:flex;
      flex-direction:column;
      gap:12px;
      font-size:12px;
    }

    #side canvas {
      width:70px;
      height:70px;
    }

    #controls {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
      margin-top:10px;
    }

    #controls button {
      padding:14px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#0ff;
      color:black;

      /* 🔥 SMOOTH EFFECT */
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    /* 👆 PRESS EFFECT */
    #controls button:active {
      transform: scale(1.2);
      box-shadow: 0 0 15px cyan;
    }

    /* 📱 TOUCH FEEDBACK FIX */
    #controls button {
      -webkit-tap-highlight-color: transparent;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<div id="container">

  <canvas id="game"></canvas>

  <div id="side">
    <div>Score: <span id="score">0</span></div>
    <div>Level: <span id="level">1</span></div>

    <div>Next</div>
    <canvas id="next" width="100" height="100"></canvas>

    <div>Hold</div>
    <canvas id="hold" width="100" height="100"></canvas>

    <div id="controls">
      <button onclick="move(-1)">⬅️</button>
      <button onclick="move(1)">➡️</button>
      <button onclick="rotate()">🔄</button>
      <button onclick="moveDown()">⬇️</button>
      <button onclick="hardDrop()">⚡</button>
      <button onclick="hold()">🧊</button>
    </div>
  </div>

</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
// (Game logic unchanged — keep your existing JS here)
</script>

</body>
</html>
