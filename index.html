<!DOCTYPE html>
<html>
<head>
  <title>Tetris Pro (Hold + Next)</title>
  <style>
    body {
      margin:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      font-family:Arial;
    }

    canvas {
      background:black;
      box-shadow:0 0 20px cyan;
    }

    #panel {
      margin-left:20px;
    }

    #controls {
      position:fixed;
      bottom:20px;
      display:flex;
      gap:10px;
    }

    #controls button {
      padding:15px;
      font-size:20px;
      background:#0ff;
      border:none;
      border-radius:8px;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:30px;
    }
  </style>
</head>

<body>

<canvas id="game" width="200" height="400"></canvas>

<div id="panel">
  <h2>Score: <span id="score">0</span></h2>
  <h3>Level: <span id="level">1</span></h3>

  <h3>Next</h3>
  <canvas id="next" width="100" height="100"></canvas>

  <h3>Hold</h3>
  <canvas id="hold" width="100" height="100"></canvas>
</div>

<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="moveDown()">⬇️</button>
</div>

<div id="overlay">
  <div>GAME OVER</div>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const nextCanvas = document.getElementById("next");
const nextCtx = nextCanvas.getContext("2d");

const holdCanvas = document.getElementById("hold");
const holdCtx = holdCanvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const SIZE = 20;

let board, piece, nextPiece, holdPiece = null;
let canHold = true;

let score, level, speed, gameOver;

const pieces = [
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function createPiece(p){
 return {
   shape: p.shape.map(row => [...row]),
   color: p.color,
   x: Math.floor(COLS/2)-1,
   y: 0
 };
}

function randomPiece(){
 return createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
}

function init(){
 board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score = 0;
 level = 1;
 speed = 500;
 gameOver = false;

 piece = randomPiece();
 nextPiece = randomPiece();
 holdPiece = null;

 updateUI();
 gameLoop();
}

function drawCell(ctx,x,y,color,size){
 ctx.fillStyle=color;
 ctx.fillRect(x*size,y*size,size,size);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*size,y*size,size,size);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val) drawCell(ctx,x,y,val,SIZE);
   });
 });

 piece.shape.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val) drawCell(ctx,piece.x+x,piece.y+y,piece.color,SIZE);
   });
 });

 drawMini(nextCtx, nextPiece);
 drawMini(holdCtx, holdPiece);
}

function drawMini(ctx,p){
 ctx.clearRect(0,0,100,100);
 if(!p) return;

 p.shape.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val) drawCell(ctx,x,y,p.color,20);
   });
 });
}

function collision(){
 for(let y=0;y<piece.shape.length;y++){
   for(let x=0;x<piece.shape[y].length;x++){
     if(!piece.shape[y][x]) continue;

     let newX = piece.x + x;
     let newY = piece.y + y;

     if(newX < 0 || newX >= COLS) return true;
     if(newY >= ROWS) return true;
     if(newY >= 0 && board[newY][newX]) return true;
   }
 }
 return false;
}

function canMove(dir){
 for(let y=0;y<piece.shape.length;y++){
   for(let x=0;x<piece.shape[y].length;x++){
     if(!piece.shape[y][x]) continue;

     let newX = piece.x + x + dir;
     if(newX < 0 || newX >= COLS) return false;
   }
 }
 return true;
}

function merge(){
 piece.shape.forEach((row,y)=>{
   row.forEach((val,x)=>{
     if(val){
       if(piece.y+y < 0){
         endGame();
         return;
       }
       board[piece.y+y][piece.x+x] = piece.color;
     }
   });
 });
}

function clearLines(){
 let lines = 0;

 board = board.filter(row=>{
   if(row.every(cell=>cell!==0)){
     lines++;
     return false;
   }
   return true;
 });

 while(board.length < ROWS){
   board.unshift(Array(COLS).fill(0));
 }

 if(lines > 0){
   score += lines * 10;
   level = Math.floor(score/50)+1;
   speed = Math.max(100,500-(level*40));
   updateUI();
 }
}

function updateUI(){
 document.getElementById("score").innerText = score;
 document.getElementById("level").innerText = level;
}

function spawnNext(){
 piece = nextPiece;
 piece.x = Math.floor(COLS/2)-1;
 piece.y = 0;

 nextPiece = randomPiece();
 canHold = true;

 if(collision()) endGame();
}

function moveDown(){
 if(gameOver) return;

 piece.y++;

 if(collision()){
   piece.y--;
   merge();
   clearLines();
   spawnNext();
 }
}

function move(dir){
 if(!canMove(dir)) return;

 piece.x += dir;
 if(collision()) piece.x -= dir;
}

function rotate(){
 let rotated = piece.shape[0].map((_,i)=>
   piece.shape.map(row=>row[i]).reverse()
 );

 let oldX = piece.x;
 let oldShape = piece.shape;

 piece.shape = rotated;

 if(collision()){
   piece.x++;
   if(collision()){
     piece.x -= 2;
     if(collision()){
       piece.x = oldX;
       piece.shape = oldShape;
     }
   }
 }
}

// 🔒 HOLD SYSTEM
function hold(){
 if(!canHold) return;

 if(!holdPiece){
   holdPiece = createPiece(piece);
   spawnNext();
 } else {
   let temp = createPiece(piece);
   piece = createPiece(holdPiece);
   holdPiece = temp;
 }

 piece.x = Math.floor(COLS/2)-1;
 piece.y = 0;

 canHold = false;
}

function endGame(){
 gameOver = true;
 document.getElementById("overlay").style.display = "flex";
}

window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
   e.preventDefault();
 }

 if(gameOver) return;

 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();

 // 🔒 HOLD KEY
 if(e.key==="c" || e.key==="C") hold();
});

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();

 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
