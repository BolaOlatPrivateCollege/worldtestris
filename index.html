<!DOCTYPE html>
<html>
<head>
  <title>Tetris Mobile FINAL FIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      overflow:hidden;
    }

    #game {
      display:block;
      margin:auto;
      background:black;
      box-shadow:0 0 15px cyan;
    }

    #panel {
      text-align:center;
      font-size:14px;
    }

    #controls {
      display:grid;
      grid-template-columns: repeat(3, 1fr); /* FIXED */
      gap:8px;
      padding:10px;
    }

    #controls button {
      padding:12px;
      font-size:18px;
      border:none;
      border-radius:8px;
      background:#0ff;
      color:black;
    }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<canvas id="game"></canvas>

<div id="panel">
  Score: <span id="score">0</span> |
  Level: <span id="level">1</span>
</div>

<!-- 🎮 ALL CONTROLS NOW VISIBLE -->
<div id="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="move(1)">➡️</button>

  <button onclick="moveDown()">⬇️</button>
  <button onclick="hardDrop()">⚡</button>
  <button onclick="hold()">🧊</button>
</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<!-- AUDIO -->
<audio id="bgm" src="bg.mp3" loop></audio>
<audio id="moveSound" src="move.wav"></audio>
<audio id="rotateSound" src="rotate.wav"></audio>
<audio id="clearSound" src="clear.wav"></audio>
<audio id="dropSound" src="drop.wav"></audio>
<audio id="gameOverSound" src="gameover.wav"></audio>

<script>
// 🔊 SOUND SYSTEM
let volume = 0.5;
let muted = false;

function playSound(id){
  if(muted) return;
  let s = document.getElementById(id);
  s.currentTime = 0;
  s.volume = volume;
  s.play().catch(()=>{});
}

// 🔓 MOBILE AUDIO FIX
document.body.addEventListener("click", ()=>{
  document.getElementById("bgm").play().catch(()=>{});
}, {once:true});

// GAME SETUP
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS=20, COLS=10;
let SIZE;

// 📱 AUTO FIT
function resizeGame(){
  const h = window.innerHeight * 0.6;
  SIZE = Math.floor(h / ROWS);

  canvas.width = COLS * SIZE;
  canvas.height = ROWS * SIZE;
}
resizeGame();
window.addEventListener("resize", resizeGame);

let board, piece, score, level, speed, gameOver;

const pieces=[
 {shape:[[1,1,1,1]],color:"cyan"},
 {shape:[[1,1],[1,1]],color:"yellow"},
 {shape:[[0,1,0],[1,1,1]],color:"purple"},
 {shape:[[0,1,1],[1,1,0]],color:"green"},
 {shape:[[1,1,0],[0,1,1]],color:"red"},
 {shape:[[1,0,0],[1,1,1]],color:"blue"},
 {shape:[[0,0,1],[1,1,1]],color:"orange"}
];

function randomPiece(){
 let p=pieces[Math.floor(Math.random()*pieces.length)];
 return {shape:p.shape.map(r=>[...r]),color:p.color,x:3,y:0};
}

function init(){
 board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
 score=0; level=1; speed=500; gameOver=false;
 piece=randomPiece();

 document.getElementById("bgm").volume = volume;

 gameLoop();
}

function drawCell(x,y,color){
 ctx.fillStyle=color;
 ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
 ctx.strokeStyle="#111";
 ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(x,y,v)));
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(piece.x+x,piece.y+y,piece.color)));
}

function collision(){
 for(let y=0;y<piece.shape.length;y++){
  for(let x=0;x<piece.shape[y].length;x++){
    if(!piece.shape[y][x]) continue;

    let nx=piece.x+x, ny=piece.y+y;

    if(nx<0||nx>=COLS) return true;
    if(ny>=ROWS) return true;
    if(ny>=0&&board[ny][nx]) return true;
  }
 }
 return false;
}

function merge(){
 piece.shape.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   if(piece.y+y<0) endGame();
   board[piece.y+y][piece.x+x]=piece.color;
  }
 }));
}

function clearLines(){
 let lines=0;
 board=board.filter(r=>{
  if(r.every(c=>c!==0)){lines++;return false;}
  return true;
 });

 while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

 if(lines>0){
  playSound("clearSound");
  score+=lines*10;
 }
}

function moveDown(){
 if(gameOver) return;

 piece.y++;
 if(collision()){
  piece.y--;
  merge();
  clearLines();
  piece=randomPiece();
 }
}

function move(d){
 piece.x+=d;
 if(collision()) piece.x-=d;
 else playSound("moveSound");
}

function rotate(){
 let r=piece.shape[0].map((_,i)=>piece.shape.map(row=>row[i]).reverse());
 let old=piece.shape;
 piece.shape=r;
 if(collision()) piece.shape=old;
 else playSound("rotateSound");
}

// ⚡ HARD DROP
function hardDrop(){
 while(!collision()) piece.y++;
 piece.y--;

 playSound("dropSound");

 merge();
 clearLines();
 piece=randomPiece();
}

// 🧊 HOLD (simple)
let held=null;
function hold(){
 if(!held){
  held=piece;
  piece=randomPiece();
 } else {
  let temp=piece;
  piece=held;
  held=temp;
 }
}

// GAME OVER
function endGame(){
 gameOver=true;
 playSound("gameOverSound");
 document.getElementById("overlay").style.display="flex";
}

// KEYBOARD
window.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") move(-1);
 if(e.key==="ArrowRight") move(1);
 if(e.key==="ArrowDown") moveDown();
 if(e.key==="ArrowUp") rotate();
 if(e.code==="Space") hardDrop();
 if(e.key==="c") hold();
});

function gameLoop(){
 if(gameOver) return;

 moveDown();
 draw();
 setTimeout(gameLoop,speed);
}

init();
</script>

</body>
</html>
